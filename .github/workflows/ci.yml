name: CI

on:
  workflow_dispatch:        # manual trigger from any branch/PR
  push:
    branches: [main, "release/**"]
    tags: ["v*.*.*"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - name: Create venv (uv downloads the Python version if needed)
        run: |
          uv venv --python ${{ matrix.python-version }}
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: uv pip install -e ".[dev]"
      - name: Audit dependencies
        run: uv pip install pip-audit && pip-audit --skip-editable
        continue-on-error: true
      - name: Run tests with coverage
        env:
          EXPENSE_TRACKER_DATA: ${{ runner.temp }}/finn-tracker-test
        run: |
          mkdir -p "$EXPENSE_TRACKER_DATA/expense" "$EXPENSE_TRACKER_DATA/income"
          python -c "from sample_data.generators import write_demo_files; write_demo_files('${{ runner.temp }}/finn-tracker-test/expense')"
          python -m pytest tests/ -v \
            --cov=finn_tracker --cov=parsers --cov=utils \
            --cov=app --cov=ingest --cov=models \
            --cov-report=term-missing

  coverage-badge:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - name: Create venv
        run: |
          uv venv --python 3.12
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: uv pip install -e ".[dev]"
      - name: Generate coverage JSON
        env:
          EXPENSE_TRACKER_DATA: ${{ runner.temp }}/finn-tracker-test
        run: |
          mkdir -p "$EXPENSE_TRACKER_DATA/expense" "$EXPENSE_TRACKER_DATA/income"
          python -c "from sample_data.generators import write_demo_files; write_demo_files('${{ runner.temp }}/finn-tracker-test/expense')"
          python -m pytest tests/ -q \
            --cov=finn_tracker --cov=parsers --cov=utils \
            --cov=app --cov=ingest --cov=models \
            --cov-report=json:coverage.json
      - name: Create badge JSON
        run: |
          TOTAL=$(python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered_display']))")
          if [ "$TOTAL" -ge 80 ]; then COLOR="brightgreen"
          elif [ "$TOTAL" -ge 60 ]; then COLOR="yellow"
          elif [ "$TOTAL" -ge 40 ]; then COLOR="orange"
          else COLOR="red"; fi
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${TOTAL}%\",\"color\":\"${COLOR}\"}" > badge.json
      - name: Upload badge to gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          jq -n --arg content "$(cat badge.json)" '{files: {"badge.json": {content: $content}}}' \
            | gh api gists/9088e1501976e0528e0da2fa5d38a465 -X PATCH --input -

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # for trusted publishing
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - name: Build
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
